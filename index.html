---
layout: default
---
    <ol>
      {% for post in site.posts %}
      <li class="index-item">
        {% if post.image %}<a href="{{ post.url }}"><img src="{{ post.image }}" alt="{{ post.title }}" class="index-image"></a>{% endif %}
        <div class="index-content">
          <p class="post-title"><a href="{{ post.url }}">{{ post.title }}</a></p>
          <p class="post-meta">{{ post.date | date: "%B %-d, %Y" }}</p>
          <p class="post-standfirst">{{ post.standfirst }}</p>
        </div>
      </li>
      {% endfor %}
    </ol>
